<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Review Reply — Trapp Rentals</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8a020;
    --accent-dim: rgba(232,160,32,0.12);
    --text: #f0ede8;
    --muted: #6b6560;
    --danger: #c0392b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header { margin-bottom: 28px; }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .stars {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .star-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 18px;
    padding: 8px 6px;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    text-align: center;
  }

  .star-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    outline: none;
    min-height: 120px;
  }

  textarea::placeholder { color: var(--muted); }

  /* Mode selector */
  .mode-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: block;
  }

  .mode-buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 0;
  }

  .mode-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.3;
  }

  .mode-btn .mode-title {
    font-weight: 700;
    display: block;
    margin-bottom: 2px;
  }

  .mode-btn .mode-desc {
    font-size: 12px;
    color: var(--muted);
    display: block;
  }

  .mode-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  .mode-btn.active .mode-title { color: var(--accent); }

  /* Context field — shown for modes 2 and 3 */
  .context-field {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .context-field.visible { display: block; }

  .context-field textarea {
    min-height: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    margin-top: 8px;
  }

  .context-field textarea:focus { border-color: var(--accent); outline: none; }

  .generate-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #0f0f0f;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-bottom: 14px;
    letter-spacing: 0.01em;
  }

  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .generate-btn:active:not(:disabled) { opacity: 0.85; }

  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .result-card.visible { display: block; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .result-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .copy-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .copy-btn:active, .copy-btn.copied {
    background: var(--accent);
    color: #0f0f0f;
  }

  .result-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
  }

  .loading {
    display: none;
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 14px;
  }

  .loading.visible { display: block; }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    display: none;
    background: rgba(192,57,43,0.1);
    border: 1px solid var(--danger);
    border-radius: 10px;
    color: #e74c3c;
    font-size: 14px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }

  .error.visible { display: block; }

  .api-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .api-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'SF Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    margin-top: 8px;
  }

  .api-input:focus { border-color: var(--accent); }

  .api-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .prompt-toggle {
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 12px 16px;
    cursor: pointer;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    transition: border-color 0.15s, color 0.15s;
  }

  .prompt-toggle.open { border-color: var(--accent); color: var(--accent); }

  .prompt-toggle .arrow {
    transition: transform 0.2s;
    font-size: 11px;
  }

  .prompt-toggle.open .arrow { transform: rotate(180deg); }

  .prompt-editor {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .prompt-editor.visible { display: block; }

  .prompt-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    line-height: 1.6;
    padding: 12px;
    outline: none;
    resize: vertical;
    min-height: 240px;
    margin-top: 8px;
    margin-bottom: 12px;
  }

  .prompt-textarea:focus { border-color: var(--accent); }

  .prompt-actions { display: flex; gap: 10px; }

  .save-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #0f0f0f;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    cursor: pointer;
    flex: 1;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    cursor: pointer;
  }

  .prompt-saved {
    font-size: 12px;
    color: var(--accent);
    margin-top: 8px;
    display: none;
  }

  .prompt-saved.visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Trapp Rentals & Storage</div>
  <h1>Draft Review Reply</h1>
</header>

<div class="api-card">
  <label for="apiKey">Anthropic API Key</label>
  <input type="password" id="apiKey" class="api-input" placeholder="sk-ant-..." autocomplete="off" />
  <p class="api-note">Saved in your browser only. Never sent anywhere except api.anthropic.com.</p>
</div>

<button class="prompt-toggle" id="promptToggle">
  <span>⚙ Edit Reply Instructions</span>
  <span class="arrow">▼</span>
</button>

<div class="prompt-editor" id="promptEditor">
  <label for="promptText">System Prompt</label>
  <textarea class="prompt-textarea" id="promptText"></textarea>
  <div class="prompt-actions">
    <button class="save-btn" id="savePromptBtn">Save</button>
    <button class="reset-btn" id="resetPromptBtn">Reset to Default</button>
  </div>
  <div class="prompt-saved" id="promptSaved">Saved — next draft will use this prompt.</div>
</div>

<div class="card">
  <label>Star Rating</label>
  <div class="stars">
    <button class="star-btn" data-stars="1">1★</button>
    <button class="star-btn" data-stars="2">2★</button>
    <button class="star-btn" data-stars="3">3★</button>
    <button class="star-btn" data-stars="4">4★</button>
    <button class="star-btn active" data-stars="5">5★</button>
  </div>
  <label for="reviewText">Review Text</label>
  <textarea id="reviewText" placeholder="Paste the customer's review here…" rows="5"></textarea>
</div>

<!-- Mode selector — only shown for 1-3 star -->
<div class="card" id="modeCard" style="display:none;">
  <span class="mode-label">What's your situation?</span>
  <div class="mode-buttons">
    <button class="mode-btn active" data-mode="unknown">
      <span class="mode-title">Haven't spoken to them</span>
      <span class="mode-desc">I don't know what happened yet</span>
    </button>
    <button class="mode-btn" data-mode="know">
      <span class="mode-title">I know what happened</span>
      <span class="mode-desc">I have context on the situation</span>
    </button>
    <button class="mode-btn" data-mode="resolved">
      <span class="mode-title">Already resolved</span>
      <span class="mode-desc">We've spoken and sorted it out</span>
    </button>
  </div>

  <div class="context-field" id="contextField">
    <label for="contextText" id="contextLabel">Context</label>
    <textarea id="contextText" placeholder=""></textarea>
  </div>
</div>

<button class="generate-btn" id="generateBtn">Draft Reply</button>

<div class="loading" id="loading">
  <div class="spinner"></div><br>
  Writing your reply…
</div>

<div class="error" id="error"></div>

<div class="result-card" id="resultCard">
  <div class="result-header">
    <span class="result-label">Draft Reply</span>
    <button class="copy-btn" id="copyBtn">Copy</button>
  </div>
  <div class="result-text" id="resultText"></div>
</div>

<script>
  // ── DEFAULT PROMPTS ──────────────────────────────────────────────

  const SHARED_CONTEXT = `You are a reply-drafting assistant for Trapp Rentals & Storage, a shipping container sales and rental business in Piermont, NH serving NH and VT. Owner: Tucker. One employee: Adam. Core differentiators: customers select their exact unit via photos/video before delivery, placement guarantee, 80% buyback within 12 months, next-day delivery on in-stock units, physical yard customers can visit. Tucker runs a small, personal operation — customers know him by name. The voice should reflect that: direct, human, no corporate filler. Never use "we strive to", "our goal is", "rest assured", or any templated phrases. Sign off: — Tucker`;

  const DEFAULT_PROMPTS = {
    positive: `${SHARED_CONTEXT}

TASK: Write a Google review reply. The customer left {STARS} star(s).

RULES:
- 3–5 sentences max.
- 5-star: Thank them genuinely. Pick up on one specific detail they mentioned and reflect it back — this proves you actually read it. Leave the door open for future business without sounding needy.
- 4-star: Same as 5-star, plus briefly acknowledge whatever they flagged. Don't be defensive. Don't over-explain. One sentence of acknowledgment is enough.
- Never sound like a template. Every reply should feel like Tucker wrote it himself for this specific person.

Output the reply only. No commentary, no labels, no quotes.`,

    unknown: `${SHARED_CONTEXT}

TASK: Write a reply to a negative Google review ({STARS} star(s)). Tucker has NOT yet spoken to this customer and does not know what happened.

HORMOZI FRAMEWORK: You are writing to the hundreds of future customers who will read this exchange — not to the reviewer. The goal is to demonstrate Tucker's character publicly. The most powerful move is to be MORE upset about what happened to the customer than the customer is. This signals that Tucker's internal standard is higher than what they experienced. That is more reassuring to future customers than any defense.

RULES:
- 2-3 sentences maximum. Brevity signals confidence, not coldness.
- Show genuine outrage on the customer's behalf — not performative, not groveling. The tone is: "This is not okay and I take it personally."
- Do NOT concede or validate specific facts. You were not there. Acknowledge the experience, not the claims.
- Do NOT use "however" or "but" to pivot into Tucker's side of the story.
- Do NOT offer public discounts, refunds, or freebies.
- Move it offline: Tucker's number is 603-313-0124.
- The reply should make a future customer think: "If something goes wrong with my order, this guy will actually care."

Output the reply only. No commentary, no labels, no quotes.`,

    know: `${SHARED_CONTEXT}

TASK: Write a reply to a negative Google review ({STARS} star(s)). Tucker has context on what happened, provided below.

HORMOZI FRAMEWORK: You are writing to future customers reading this exchange. Show that Tucker's standard is higher than what happened — be more upset about the customer's experience than the customer is. Use the context Tucker provided to be specific where it helps credibility, but do NOT over-explain or tell Tucker's side of the story defensively.

RULES:
- 3-4 sentences maximum.
- Use the context to acknowledge the specific failure without making excuses for it.
- If Tucker has already taken action (fixed something, addressed a process), one brief mention is credible and reassuring to future customers. Don't dwell on it.
- Do NOT concede fault on disputed facts. Acknowledge impact, not necessarily cause.
- Move it offline: 603-313-0124.
- Tone: accountable, direct, human. Someone who knows what went wrong and owns it.

Tucker's context: {CONTEXT}

Output the reply only. No commentary, no labels, no quotes.`,

    resolved: `You are a reply-drafting assistant for Trapp Rentals & Storage, a shipping container sales and rental business in Piermont, NH. Owner: Tucker. One employee: Adam. Small, personal operation — customers know Tucker by name.

TASK: Write a reply to a negative Google review ({STARS} star(s)) where Tucker has already spoken to the customer and taken some action.

AUDIENCE: You are writing to two people simultaneously — the reviewer, and every future customer who will read this exchange. Both need to leave with something. The reviewer needs to feel heard and believe Tucker will follow through. Future customers need to see that when something goes wrong, Tucker owns it completely and does not stop until it is right.

BEFORE WRITING, ASSESS THE SITUATION FROM THE REVIEW AND CONTEXT PROVIDED:

A) WAS SOMETHING ALREADY DONE TO RESOLVE IT?
- If yes, and the customer's review reflects satisfaction or acknowledgment that it was handled — keep the reply brief, warm, and signal publicly that it is closed. One mention of what was done is enough. Do not over-explain.
- If yes, but the customer's review makes clear they are still at a net loss or still unhappy — do NOT imply the situation is resolved. Do not list what was done as evidence of sufficiency. The customer has already said it was not enough. Acknowledge that gap directly.
- If nothing was done yet — do not reference resolution at all. Focus on owning the failure and getting them on the phone.

B) DOES THE CUSTOMER FEEL MADE WHOLE?
- If yes — the reply validates that, acknowledges they gave Tucker the chance to fix it, and closes warmly.
- If no — the reply names the specific failures, acknowledges that what was done did not cover everything they lost, and commits to continuing the conversation. "We will make it right" earns its place only when the reply has already demonstrated Tucker understands exactly what right means in this specific situation.

STRUCTURE FOR UNRESOLVED OR PARTIALLY RESOLVED SITUATIONS:
1. Name the specific failures directly — not "your experience" but the actual things that went wrong. Specificity reads as accountability. Vagueness reads as PR.
2. If prior action was taken but was not enough, say so plainly. Do not self-congratulate by listing the replacement, refund, or prior action as evidence Tucker already did enough.
3. Commit to continuing — direct invitation to call, clear signal Tucker is not done: 603-313-0124.

TONE RULES:
- Direct and personal. Tucker is one person. Write like it.
- No corporate filler: "we strive to", "our goal is", "rest assured", "carry ourselves".
- Do not use the word "inexcusable" — liability word in writing.
- No ominous closes. "We are not done here" sounds threatening. Use "we will make it right" only after the reply has earned it by naming the actual failures.
- Sign off: — Tucker

LENGTH: 3-4 sentences maximum. Every sentence must carry weight. Cut anything that does not serve the audience.

Resolution context Tucker provided: {CONTEXT}

Output the reply only. No commentary, no labels, no quotes.`
  };

  // ── STATE ────────────────────────────────────────────────────────
  let selectedStars = 5;
  let selectedMode = 'unknown';

  // ── API KEY ──────────────────────────────────────────────────────
  const apiKeyInput = document.getElementById('apiKey');
  const savedKey = localStorage.getItem('trapp_api_key');
  if (savedKey) apiKeyInput.value = savedKey;
  apiKeyInput.addEventListener('change', () => {
    localStorage.setItem('trapp_api_key', apiKeyInput.value.trim());
  });

  // ── PROMPT EDITOR ────────────────────────────────────────────────
  const promptTextarea = document.getElementById('promptText');
  // Show the relevant default prompt based on current mode
  function getActiveDefaultPrompt() {
    if (selectedStars >= 4) return DEFAULT_PROMPTS.positive;
    return DEFAULT_PROMPTS[selectedMode] || DEFAULT_PROMPTS.unknown;
  }

  function loadPromptEditor() {
    const key = selectedStars >= 4 ? 'trapp_prompt_positive' : `trapp_prompt_${selectedMode}`;
    const saved = localStorage.getItem(key);
    promptTextarea.value = saved || getActiveDefaultPrompt();
  }

  document.getElementById('promptToggle').addEventListener('click', () => {
    const toggle = document.getElementById('promptToggle');
    const editor = document.getElementById('promptEditor');
    toggle.classList.toggle('open');
    editor.classList.toggle('visible');
    if (editor.classList.contains('visible')) loadPromptEditor();
  });

  document.getElementById('savePromptBtn').addEventListener('click', () => {
    const key = selectedStars >= 4 ? 'trapp_prompt_positive' : `trapp_prompt_${selectedMode}`;
    localStorage.setItem(key, promptTextarea.value);
    const saved = document.getElementById('promptSaved');
    saved.classList.add('visible');
    setTimeout(() => saved.classList.remove('visible'), 2500);
  });

  document.getElementById('resetPromptBtn').addEventListener('click', () => {
    if (confirm('Reset this prompt to default? Your edits will be lost.')) {
      const key = selectedStars >= 4 ? 'trapp_prompt_positive' : `trapp_prompt_${selectedMode}`;
      localStorage.removeItem(key);
      promptTextarea.value = getActiveDefaultPrompt();
    }
  });

  // ── STARS ────────────────────────────────────────────────────────
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedStars = parseInt(btn.dataset.stars);
      // Show/hide mode selector
      const modeCard = document.getElementById('modeCard');
      modeCard.style.display = selectedStars <= 3 ? 'block' : 'none';
      hideResult();
      clearError();
    });
  });

  // ── MODE SELECTOR ────────────────────────────────────────────────
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMode = btn.dataset.mode;
      updateContextField();
      hideResult();
      clearError();
    });
  });

  function updateContextField() {
    const field = document.getElementById('contextField');
    const label = document.getElementById('contextLabel');
    const textarea = document.getElementById('contextText');

    if (selectedMode === 'know') {
      field.classList.add('visible');
      label.textContent = 'What do you know about what happened?';
      textarea.placeholder = 'e.g. The delivery was late because Adam took a wrong turn. The container door issue was pre-existing — I should have caught it before it left the yard.';
    } else if (selectedMode === 'resolved') {
      field.classList.add('visible');
      label.textContent = 'How was it resolved?';
      textarea.placeholder = 'e.g. I called them back, delivered a replacement container the next morning, and refunded their first month.';
    } else {
      field.classList.remove('visible');
      textarea.value = '';
    }
  }

  // ── GENERATE ─────────────────────────────────────────────────────
  document.getElementById('generateBtn').addEventListener('click', async () => {
    const apiKey = apiKeyInput.value.trim();
    const reviewText = document.getElementById('reviewText').value.trim();
    const contextText = document.getElementById('contextText').value.trim();

    if (!apiKey) { showError('Enter your Anthropic API key above.'); return; }
    if (!reviewText) { showError('Paste a review first.'); return; }
    if ((selectedMode === 'know' || selectedMode === 'resolved') && !contextText && selectedStars <= 3) {
      showError('Add some context above — what happened or how was it resolved?'); return;
    }

    setLoading(true);
    clearError();
    hideResult();

    // Pick the right prompt
    let promptKey, basePrompt;
    if (selectedStars >= 4) {
      promptKey = 'trapp_prompt_positive';
      basePrompt = localStorage.getItem(promptKey) || DEFAULT_PROMPTS.positive;
    } else {
      promptKey = `trapp_prompt_${selectedMode}`;
      basePrompt = localStorage.getItem(promptKey) || DEFAULT_PROMPTS[selectedMode];
    }

    const systemPrompt = basePrompt
      .replace('{STARS}', selectedStars)
      .replace('{CONTEXT}', contextText || '(no additional context provided)');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: `Here is the Google review to reply to:\n\n${reviewText}` }]
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || `API error ${response.status}`);
      showResult(data.content?.[0]?.text || '');
    } catch (err) {
      showError(err.message || 'Something went wrong. Check your API key and try again.');
    } finally {
      setLoading(false);
    }
  });

  // ── COPY ─────────────────────────────────────────────────────────
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = document.getElementById('resultText').innerText;
    const btn = document.getElementById('copyBtn');
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand('copy');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      } catch(e) {
        btn.textContent = 'Select text manually';
        setTimeout(() => { btn.textContent = 'Copy'; }, 3000);
      }
      document.body.removeChild(ta);
    }
  });

  // ── HELPERS ──────────────────────────────────────────────────────
  function setLoading(on) {
    document.getElementById('loading').classList.toggle('visible', on);
    document.getElementById('generateBtn').disabled = on;
  }
  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function clearError() { document.getElementById('error').classList.remove('visible'); }
  function showResult(text) {
    document.getElementById('resultText').textContent = text;
    document.getElementById('resultCard').classList.add('visible');
  }
  function hideResult() { document.getElementById('resultCard').classList.remove('visible'); }
</script>
</body>
</html>
